<!-- analytics -->
<script>
  // If consent is given, load Google Tag Manager first, and then GA4
  // This only runs on production
  function loadAnalytics() {
    if (window.__gtmLoaded) return;
    window.__gtmLoaded = true;

    window.dataLayer = window.dataLayer || [];
    window.dataLayer.push({ 'gtm.start': Date.now(), event: 'gtm.js' });

    var s = document.createElement('script');
    s.async = true;
    s.src = 'https://www.googletagmanager.com/gtm.js?id=GTM-K5L8F5XD';
    document.head.appendChild(s);

    function gtag(){dataLayer.push(arguments);}

    gtag('js', new Date());
    gtag('config', 'G-MBPEML5F6R');
  }

  $(document).ready(function() {
    var options = {
      onAccept: function() {
        if ($.fn.ihavecookies.preference('analytics') === true) {
          loadAnalytics();
        }
      },
      cookieTypes: [
        {
          type: 'Analytics',
          value: 'analytics',
          description: 'Cookies related to site visits, browser types, etc.'
        }
      ]
    };

    $('body').ihavecookies(options)

    // This runs if the user has previously accepted analytics cookies, otherwise the onAccept callback will run
    if ($.fn.ihavecookies.preference('analytics') === true) {
      loadAnalytics();
    }
  });
</script>
